<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fundo escuro arredondado -->
  <rect width="32" height="32" rx="7" fill="#0a120e"/>
  <!-- Peciolo (cabinho da folha) -->
  <path d="M 5 27 L 9 23" stroke="#1a8d4a" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Folha: base arredondada (SW), ponta afilada (NE) -->
  <path d="M 9 23 C 5 18, 11 6, 25 5 C 26 14, 17 23, 9 23 Z" fill="#2dd470"/>
  <!-- Metade superior em verde mais claro, dando profundidade (gradiente "natural") -->
  <path d="M 9 23 C 5 18, 11 6, 25 5 Q 17 9, 9 23 Z" fill="#5be095"/>
  <!-- Nervura central, curva seguindo o eixo da folha -->
  <path d="M 9 23 Q 13 14, 25 5" stroke="#0d4422" stroke-width="1.1" fill="none" stroke-linecap="round"/>
</svg>
