<!doctype html>
<!--
  ============================================================================
  iNat Species Quiz — versão 100% estática (HTML + CSS + JS, sem build)
  ============================================================================
  Esta página chama a API pública do iNaturalist (api.inaturalist.org)
  diretamente do navegador. O iNat tem CORS habilitado para GET, então
  não é preciso servidor intermediário.

  Pode ser hospedada em qualquer lugar que sirva arquivos estáticos:
  GitHub Pages, Netlify, Vercel, Cloudflare Pages, ou apenas servida
  localmente com `python -m http.server 8080`.

  Toda a lógica do quiz, pontuação, histórico e prefetch acontece no
  cliente — nada é enviado para servidores próprios.

  Visual: design system v2 (Field Notebook) — espelha o mockup em
  mockup/index-v2.html e o app React em client/.
  ============================================================================
-->
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Quiz de adivinhar espécies com fotos do iNaturalist. Versão 100% cliente." />
    <meta name="theme-color" content="#0a120e" />
    <title>iNat Species Quiz</title>

    <!-- Open Graph / social preview -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="iNat Species Quiz" />
    <meta property="og:description" content="Quiz para identificar espécies de fotos reais do iNaturalist. 4 níveis de dificuldade, filtros por grupo taxonômico e localidade." />
    <meta property="og:image"       content="https://vinisouza128.github.io/inat-species-quiz/og-image.svg" />
    <meta property="og:url"         content="https://vinisouza128.github.io/inat-species-quiz/" />
    <meta name="twitter:card"       content="summary_large_image" />
    <meta name="twitter:image"      content="https://vinisouza128.github.io/inat-species-quiz/og-image.svg" />

    <!-- Fontes: Inter (UI), Fraunces (títulos/serif), JetBrains Mono (números). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,500;1,9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- PWA: manifest + icones para "adicionar a tela inicial" / instalar como app -->
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="iNat Quiz" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Container raiz: o JS popula tudo aqui dentro. -->
    <div id="root"></div>
    <!-- ES Modules: cada arquivo importa explicitamente o que precisa. -->
    <script type="module" src="js/main.js"></script>
    <!-- PWA: registra o service worker (offline + instalavel). Carregado em separado
         para que falhas em main.js nao impecam a instalacao do app. -->
    <script type="module" src="js/pwa.js"></script>
  </body>
</html>
