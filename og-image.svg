<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background ambient glows -->
    <radialGradient id="bg1" cx="0.25" cy="0.5" r="0.65">
      <stop offset="0%" stop-color="#1a4d2e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a120e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="0.82" cy="0.2" r="0.42">
      <stop offset="0%" stop-color="#3d2500" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0a120e" stop-opacity="0"/>
    </radialGradient>
    <!-- Photo panel clip -->
    <clipPath id="pc">
      <rect x="32" y="32" width="648" height="566" rx="16"/>
    </clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1200" height="630" fill="#0a120e"/>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- ── PHOTO PANEL (clipped) ── -->
  <g clip-path="url(#pc)">
    <!-- Base -->
    <rect x="32" y="32" width="648" height="566" fill="#0b1710"/>

    <!-- Far-background foliage (very dark) -->
    <ellipse cx="155" cy="125" rx="195" ry="52" fill="#081208" transform="rotate(-28,155,125)"/>
    <ellipse cx="605" cy="85"  rx="205" ry="50" fill="#081208" transform="rotate(18,605,85)"/>
    <ellipse cx="692" cy="415" rx="165" ry="46" fill="#081208" transform="rotate(-18,692,415)"/>
    <ellipse cx="58"  cy="380" rx="132" ry="40" fill="#081208" transform="rotate(-40,58,380)"/>

    <!-- Mid foliage -->
    <ellipse cx="95"  cy="218" rx="105" ry="36" fill="#0b1c0d" transform="rotate(-35,95,218)"/>
    <ellipse cx="615" cy="178" rx="118" ry="34" fill="#0b1c0d" transform="rotate(22,615,178)"/>
    <ellipse cx="118" cy="502" rx="145" ry="42" fill="#0b1c0d" transform="rotate(-25,118,502)"/>

    <!-- Branch -->
    <rect x="125" y="450" width="430" height="20" rx="10" fill="#0d2014"/>
    <rect x="115" y="458" width="450" height="12" rx="6"  fill="#102818"/>

    <!-- ── TOUCAN ── -->
    <!-- Tail feathers -->
    <ellipse cx="302" cy="418" rx="28" ry="58" fill="#0d1e16" transform="rotate(20,302,418)"/>
    <ellipse cx="282" cy="438" rx="20" ry="48" fill="#0b1912" transform="rotate(30,282,438)"/>
    <!-- Body -->
    <ellipse cx="358" cy="352" rx="86" ry="103" fill="#162818"/>
    <!-- Wing shadow -->
    <ellipse cx="314" cy="372" rx="60"  ry="84"  fill="#0f1e14" transform="rotate(-12,314,372)"/>
    <!-- Neck -->
    <ellipse cx="358" cy="252" rx="36" ry="46" fill="#162818"/>
    <!-- Head -->
    <circle cx="358" cy="202" r="60" fill="#1b2e20"/>

    <!-- BEAK — large toucan -->
    <path d="M382 193 C390 190 482 206 526 231 C538 244 533 263 522 269 L382 238 Z" fill="#fbbf24"/>
    <path d="M384 195 C438 203 491 219 524 238" stroke="#fde68a" stroke-width="1.5" fill="none" opacity="0.55"/>
    <path d="M382 238 L522 269 C512 282 492 279 382 254 Z" fill="#d97706"/>
    <ellipse cx="521" cy="254" rx="9" ry="7" fill="#b45309"/>

    <!-- Breast highlight -->
    <ellipse cx="358" cy="382" rx="56" ry="70" fill="#1e3824" opacity="0.55"/>

    <!-- Eye -->
    <circle cx="376" cy="190" r="15" fill="#eef8ee"/>
    <circle cx="376" cy="190" r="10" fill="#0d160d"/>
    <circle cx="376" cy="190" r="5"  fill="#060d06"/>
    <circle cx="380" cy="186" r="3.5" fill="#eef8ee"/>

    <!-- Feet -->
    <rect x="318" y="448" width="9" height="30" rx="4" fill="#0d1e14"/>
    <path d="M318 476 L298 488 M322 476 L322 492 M327 476 L343 488" stroke="#0d1e14" stroke-width="5" stroke-linecap="round"/>
    <rect x="396" y="448" width="9" height="30" rx="4" fill="#0d1e14"/>
    <path d="M396 476 L376 488 M400 476 L400 492 M405 476 L421 488" stroke="#0d1e14" stroke-width="5" stroke-linecap="round"/>

    <!-- Soft glow halo -->
    <ellipse cx="358" cy="308" rx="128" ry="158" fill="#2dd470" fill-opacity="0.03"/>

    <!-- Foreground leaves (overlap bird) -->
    <ellipse cx="48"  cy="558" rx="152" ry="50" fill="#0d1e14" transform="rotate(-20,48,558)"/>
    <ellipse cx="662" cy="552" rx="132" ry="44" fill="#0d1e14" transform="rotate(15,662,552)"/>
    <ellipse cx="675" cy="198" rx="88"  ry="30" fill="#0a1810" transform="rotate(-10,675,198)"/>
  </g>

  <!-- Photo panel border -->
  <rect x="32" y="32" width="648" height="566" rx="16" fill="none" stroke="#182c1e" stroke-width="1.5"/>

  <!-- Attribution strip at bottom of photo -->
  <path d="M48 564 L664 564 L664 598 Q664 598 648 598 L48 598 Q32 598 32 582 L32 564 Z" fill="#04090606" fill-opacity="0"/>
  <rect x="32" y="564" width="648" height="34" fill="#04090606"/>
  <!-- Rounded bottom corners handled by clip -->
  <text x="55" y="585" fill="#3a5244" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5">Mata Atlantica, Brasil  ·  CC BY-NC 4.0  ·  iNaturalist</text>

  <!-- ── RIGHT PANEL ── -->

  <!-- Leaf logo (mesmo desenho do favicon.svg, escalado para regiao 90x90 em (715-805, 30-120)) -->
  <g transform="translate(715 30) scale(2.8125)">
    <!-- Peciolo (cabinho) -->
    <path d="M 5 27 L 9 23" stroke="#1a8d4a" stroke-width="1.6" stroke-linecap="round"/>
    <!-- Folha base (verde medio) -->
    <path d="M 9 23 C 5 18, 11 6, 25 5 C 26 14, 17 23, 9 23 Z" fill="#2dd470"/>
    <!-- Metade superior em verde mais claro, dando profundidade -->
    <path d="M 9 23 C 5 18, 11 6, 25 5 Q 17 9, 9 23 Z" fill="#5be095"/>
    <!-- Nervura central curva -->
    <path d="M 9 23 Q 13 14, 25 5" stroke="#0d4422" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  </g>

  <!-- App title -->
  <text x="804" y="92" fill="#ecf3ec"
        font-family="Georgia,'Times New Roman',serif"
        font-size="33" font-weight="700">iNat Species Quiz</text>

  <!-- Subtitle -->
  <text x="720" y="134" fill="#6b8a78"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="14.5">Identifique especies de fotos reais do iNaturalist</text>

  <!-- Divider -->
  <rect x="720" y="153" width="448" height="1" fill="#182c1e"/>

  <!-- Question label -->
  <text x="720" y="188" fill="#cce8d2"
        font-family="Georgia,'Times New Roman',serif"
        font-size="20" font-weight="600">Qual e esta especie?</text>

  <!-- ── CHOICE A — CORRECT ── -->
  <rect x="720" y="203" width="448" height="58" rx="11" fill="#0b2c1a" stroke="#2dd470" stroke-width="1.5"/>
  <rect x="734" y="218" width="27" height="27" rx="6" fill="#2dd470" fill-opacity="0.18"/>
  <text x="747" y="237" fill="#2dd470"
        font-family="'Courier New',monospace" font-size="13" font-weight="700" text-anchor="middle">A</text>
  <rect x="771" y="218" width="1" height="25" fill="#2dd470" fill-opacity="0.28"/>
  <text x="787" y="238" fill="#ecf3ec"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="15" font-weight="500">Tucano-de-bico-preto</text>
  <!-- Checkmark path -->
  <circle cx="1143" cy="232" r="11" fill="#2dd470" fill-opacity="0.14" stroke="#2dd470" stroke-width="1.5"/>
  <path d="M1137 232 L1141 237 L1150 224" stroke="#2dd470" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── CHOICE B ── -->
  <rect x="720" y="273" width="448" height="54" rx="11" fill="#111b14" stroke="#182c1e" stroke-width="1"/>
  <rect x="734" y="287" width="27" height="26" rx="6" fill="#182c1e"/>
  <text x="747" y="305" fill="#3d5a46"
        font-family="'Courier New',monospace" font-size="13" font-weight="700" text-anchor="middle">B</text>
  <rect x="771" y="288" width="1" height="21" fill="#182c1e"/>
  <text x="787" y="305" fill="#5a7a64"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15">Arara-azul</text>

  <!-- ── CHOICE C ── -->
  <rect x="720" y="339" width="448" height="54" rx="11" fill="#111b14" stroke="#182c1e" stroke-width="1"/>
  <rect x="734" y="353" width="27" height="26" rx="6" fill="#182c1e"/>
  <text x="747" y="371" fill="#3d5a46"
        font-family="'Courier New',monospace" font-size="13" font-weight="700" text-anchor="middle">C</text>
  <rect x="771" y="354" width="1" height="21" fill="#182c1e"/>
  <text x="787" y="371" fill="#5a7a64"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15">Papagaio-verdadeiro</text>

  <!-- ── CHOICE D ── -->
  <rect x="720" y="405" width="448" height="54" rx="11" fill="#111b14" stroke="#182c1e" stroke-width="1"/>
  <rect x="734" y="419" width="27" height="26" rx="6" fill="#182c1e"/>
  <text x="747" y="437" fill="#3d5a46"
        font-family="'Courier New',monospace" font-size="13" font-weight="700" text-anchor="middle">D</text>
  <rect x="771" y="420" width="1" height="21" fill="#182c1e"/>
  <text x="787" y="437" fill="#5a7a64"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15">Bem-te-vi</text>

  <!-- Info strip -->
  <rect x="720" y="474" width="448" height="44" rx="10" fill="#0c1710"/>
  <text x="740" y="501" fill="#3d5a46"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13">4 niveis de dificuldade  ·  filtros por grupo e localidade</text>

  <!-- Tech tags -->
  <rect x="720" y="534" width="70"  height="24" rx="12" fill="#0c1710" stroke="#182c1e" stroke-width="1"/>
  <text x="755" y="551" fill="#3d6050" font-family="'Courier New',monospace" font-size="11.5" text-anchor="middle">React</text>

  <rect x="798" y="534" width="94"  height="24" rx="12" fill="#0c1710" stroke="#182c1e" stroke-width="1"/>
  <text x="845" y="551" fill="#3d6050" font-family="'Courier New',monospace" font-size="11.5" text-anchor="middle">TypeScript</text>

  <rect x="900" y="534" width="98"  height="24" rx="12" fill="#0c1710" stroke="#182c1e" stroke-width="1"/>
  <text x="949" y="551" fill="#3d6050" font-family="'Courier New',monospace" font-size="11.5" text-anchor="middle">iNaturalist</text>

  <rect x="1006" y="534" width="72"  height="24" rx="12" fill="#0c1710" stroke="#182c1e" stroke-width="1"/>
  <text x="1042" y="551" fill="#3d6050" font-family="'Courier New',monospace" font-size="11.5" text-anchor="middle">SQLite</text>

  <!-- Outer frame -->
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="#111e16" stroke-width="1"/>
</svg>
